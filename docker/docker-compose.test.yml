version: "3.9"

services:
  backend:
    env_file:
      - ../.env.test
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend
      - ../storage/test:/app/backend/storage/test

  frontend:
    env_file:
      - ../.env.test
    ports:
      - "5173:8080"
    volumes:
      - ..:/app
      - /app/node_modules

  celery_worker:
    env_file:
      - ../.env.test

  postgres:
    env_file:
      - ../.env.test
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-test:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - ../.env.test
    environment:
      PYTHONPATH: /app/backend
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app/backend
      - ../tests:/app/backend/tests
      - ../storage/test:/app/backend/storage/test
    command: ["pytest", "-q", "tests"]
