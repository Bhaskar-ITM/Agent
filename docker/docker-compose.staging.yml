version: "3.9"

services:
  backend:
    env_file:
      - ../.env.staging
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../staging-storage:/data/artifacts

  frontend:
    env_file:
      - ../.env.staging
    restart: unless-stopped
    ports:
      - "5173:5173"

  postgres:
    env_file:
      - ../.env.staging
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    restart: unless-stopped
    ports:
      - "8080:8080"

  kali:
    image: kalilinux/kali-rolling
    restart: unless-stopped
    command: ["/bin/sh", "-c", "tail -f /dev/null"]
