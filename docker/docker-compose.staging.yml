version: "3.9"

services:
  backend:
    env_file:
      - ../.env.staging
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../storage/staging:/app/backend/storage/staging

  celery_worker:
    env_file:
      - ../.env.staging
    restart: unless-stopped

  frontend:
    env_file:
      - ../.env.staging
    restart: unless-stopped
    ports:
      - "5173:5173"

  postgres:
    env_file:
      - ../.env.staging
    restart: unless-stopped

